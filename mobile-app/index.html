<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1e182a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Bongo Buddy" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="manifest" href="manifest.json" />
<title>Bongo Buddy</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">

    <!-- ============ PAIRING SCREEN ============ -->
    <div id="pairing-screen" class="screen">
      <h1>Bongo Buddy</h1>
      <p class="hint">Share this code with your partner:</p>
      <div class="code-row">
        <span id="my-code" class="code-display">------</span>
        <button id="copy-code-btn">Copy</button>
      </div>
      <button id="new-code-btn" class="link-btn">Generate a new code</button>

      <div class="divider">or</div>

      <p class="hint">Enter their code to connect:</p>
      <div class="code-row">
        <input id="join-code-input" maxlength="6" placeholder="ABC123" autocomplete="off" />
        <button id="join-code-btn">Connect</button>
      </div>

      <input id="nickname-input" placeholder="Your name (optional)" autocomplete="off" class="nickname-input" />
    </div>

    <!-- ============ MAIN BUDDY SCREEN ============ -->
    <div id="main-screen" class="screen hidden">
      <div class="top-bar">
        <span id="room-label">Room ------</span>
        <button id="settings-btn"><i class="ti ti-settings" aria-hidden="true"></i></button>
      </div>

      <div class="cats-row">
        <div class="cat-slot">
          <div class="cat-wrap" id="partner-cat"></div>
          <div class="cat-label" id="partner-label">Partner</div>
          <button id="poke-btn" class="poke-btn" title="Send a poke"><i class="ti ti-hand-click" aria-hidden="true"></i> Poke</button>
        </div>
      </div>

      <div id="status-line" class="status-line">Waiting for your partner…</div>
      <div id="skin-row" class="skin-row">
        <button class="skin-swatch" data-skin="classic" title="Classic"></button>
        <button class="skin-swatch" data-skin="midnight" title="Midnight"></button>
        <button class="skin-swatch" data-skin="sunset" title="Sunset"></button>
        <button class="skin-swatch" data-skin="golden" title="Golden"></button>
      </div>

      <div class="me-box">
        <div class="cat-wrap small" id="you-cat"></div>
        <textarea id="type-box" placeholder="Tap and type here to let them know you're around too…" rows="2"></textarea>
      </div>

      <div id="toast" class="toast hidden"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <!-- GSAP powers the bongo cat's paw/note/typing animation. Free for
       commercial use since GSAP's 2025 Webflow-sponsored license change,
       no club membership needed. -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/DrawSVGPlugin.min.js"></script>
  <script src="firebase-config.js"></script>
  <script src="bongo-cat.js"></script>
  <script src="app.js"></script>
</body>
</html>
