<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Bongo Buddy</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-card" id="app-card">

    <!-- ============ PAIRING SCREEN ============ -->
    <div id="pairing-screen" class="screen">
      <div class="drag-bar">Bongo Buddy 🐾</div>
      <div class="pairing-body">
        <p class="hint">Share a code with your partner to connect:</p>
        <div class="code-row">
          <span id="my-code" class="code-display">------</span>
          <button id="copy-code-btn" title="Copy code">Copy</button>
        </div>
        <button id="new-code-btn" class="link-btn">Generate a new code</button>

        <div class="divider">or</div>

        <p class="hint">Enter their code to connect:</p>
        <div class="code-row">
          <input id="join-code-input" maxlength="6" placeholder="ABC123" autocomplete="off" />
          <button id="join-code-btn">Connect</button>
        </div>

        <input id="nickname-input" placeholder="Your name (optional)" autocomplete="off" class="nickname-input" />
      </div>
    </div>

    <!-- ============ MAIN BUDDY SCREEN ============ -->
    <div id="main-screen" class="screen hidden">
      <div class="drag-bar">
        <span id="room-label">Room ------</span>
        <button id="settings-btn" title="Change room">⚙</button>
      </div>

      <div class="cats-row">
        <div class="cat-slot">
          <div class="cat-wrap" id="you-cat"></div>
          <div class="cat-label">You</div>
        </div>
        <div class="cat-slot">
          <div class="cat-wrap" id="partner-cat"></div>
          <div class="cat-label" id="partner-label">Partner</div>
          <button id="poke-btn" class="poke-btn" title="Send a poke">👉 Poke</button>
        </div>
      </div>

      <div id="status-line" class="status-line">Waiting for your partner…</div>
      <div id="skin-row" class="skin-row">
        <button class="skin-swatch" data-skin="classic" title="Classic"></button>
        <button class="skin-swatch" data-skin="midnight" title="Midnight"></button>
        <button class="skin-swatch" data-skin="sunset" title="Sunset"></button>
        <button class="skin-swatch" data-skin="golden" title="Golden"></button>
      </div>
      <div id="toast" class="toast hidden"></div>
    </div>
  </div>

  <!-- Firebase compat SDK (works without a bundler) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <!-- GSAP powers the bongo cat's paw/note/typing animation. Free for
       commercial use since GSAP's 2025 Webflow-sponsored license change,
       no club membership needed. -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/DrawSVGPlugin.min.js"></script>
  <script src="firebase-config.js"></script>
  <script src="bongo-cat.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
