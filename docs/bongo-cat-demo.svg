<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 783.55 354.91" width="480">
<style>
svg { background: transparent; }
.bongo-cat { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 4; }
.laptop-cover, .headphone .band { fill: none; }
.paw, .head { stroke: #ffcc81; }
.laptop-keyboard { stroke-width: 2; }
.terminal-code { stroke-width: 5; }
.music .note, .laptop-base, .laptop-cover, .paw .pads { stroke: #ff61d8; }
.table line, .headphone .band, .headphone .speaker path:nth-child(3) { stroke: #a5ea9b; }
.terminal-frame, .laptop-keyboard, .headphone .speaker path:nth-child(2) { stroke: #569cfa; }
.terminal-code, .headphone .speaker path:first-child { stroke: #7ed1e2; }

@keyframes clack-a { 0%, 45% { opacity: 1; } 50%, 100% { opacity: 0; } }
@keyframes clack-b { 0%, 45% { opacity: 0; } 50%, 100% { opacity: 1; } }
.paw-left .up, .paw-right .down { animation: clack-a 0.4s steps(1, end) infinite; }
.paw-left .down, .paw-right .up { animation: clack-b 0.4s steps(1, end) infinite; opacity: 0; }

@keyframes draw-line { from { stroke-dashoffset: 40; } to { stroke-dashoffset: 0; } }
.terminal-code line { stroke-dasharray: 40; animation: draw-line 1.1s linear infinite; }
.terminal-code line:nth-child(3n+1) { animation-delay: 0s; }
.terminal-code line:nth-child(3n+2) { animation-delay: 0.25s; }
.terminal-code line:nth-child(3n+3) { animation-delay: 0.5s; }

@keyframes fly-note {
  0% { transform: translateY(0) scale(0); opacity: 0; }
  15% { transform: translateY(-10px) scale(1); opacity: 1; }
  100% { transform: translateY(-90px) scale(1); opacity: 0; }
}
.music .note { transform-box: fill-box; transform-origin: center; opacity: 0; }
.music-right .note:nth-child(1) { animation: fly-note 2.2s ease-out infinite 0s; }
.music-right .note:nth-child(2) { animation: fly-note 2.2s ease-out infinite 0.7s; }
.music-right .note:nth-child(3) { animation: fly-note 2.2s ease-out infinite 1.4s; }
.music-left .note:nth-child(1) { animation: fly-note 2.2s ease-out infinite 0.3s; }
.music-left .note:nth-child(2) { animation: fly-note 2.2s ease-out infinite 1s; }
.music-left .note:nth-child(3) { animation: fly-note 2.2s ease-out infinite 1.7s; }
</style>
